server {
    listen 80;
    server_name babiguling.my.id www.babiguling.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name babiguling.my.id www.babiguling.my.id;

    ssl_certificate /etc/letsencrypt/live/babiguling.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babiguling.my.id/privkey.pem;

    root /var/www/babiguling/frontend/build;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:9001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name api.babiguling.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.babiguling.my.id;

    ssl_certificate /etc/letsencrypt/live/api.babiguling.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.babiguling.my.id/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
